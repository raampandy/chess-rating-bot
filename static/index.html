                                    ✅ Active on your Premium plan
                                </div>
                                <div className="phone-preview">
                                    <div style={{fontWeight:'600', marginBottom:'8px'}}>📱 Tell your child:</div>
                                    <div>Text <strong>TRIP SW12 TO SW1A 1AA</strong> for a live journey plan</div>
                                    <div style={{marginTop:'4px', color:'#666', fontSize:'0.9em'}}>Replace postcodes with any two London postcodes</div>
                                </div>
                            </div>
                        ) : (
                            <div className="card" style={{borderLeft:'4px solid #9c27b0'}}>
                                <h2 style={{color:'#9c27b0'}}>🗺️ TRIP Journey Planner</h2>
                                <p style={{color:'#666', marginBottom:'15px', fontSize:'0.9em'}}>
                                    Let your child text <strong>TRIP SW12 TO SW1A 1AA</strong> to get a live step-by-step journey plan — bus, tube, train and walking directions by SMS.
                                </p>
                                <button onClick={() => upgradePlan('premium')}
                                    style={{background:'#9c27b0', fontSize:'0.9em'}}>
                                    🌟 Upgrade to Premium to unlock TRIP (£9.99/mo)
                                </button>
                            </div>
                        )}

                        {/* Family members */}
                        {userData.is_family_owner && (
                            <div className="card">
                                <h2>👨‍👩‍👧 Family members</h2>
                                <p style={{color:'#666', marginBottom:'15px', fontSize:'0.9em'}}>
                                    {userData.family_members.length}/4 additional members added
                                </p>
                                {userData.family_members.map(m => (
                                    <div key={m} className="family-member">
                                        <span>📱 {m}</span>
                                    </div>
                                ))}
                                {userData.family_members.length < 4 && (
                                    <div style={{marginTop:'15px'}}>
                                        <input type="tel" placeholder="e.g. 07700123456"
                                            value={newMemberPhone}
                                            onChange={e => setNewMemberPhone(e.target.value)} />
                                        {memberError && <div className="error">{memberError}</div>}
                                        {memberSuccess && <div className="verified-box">{memberSuccess}</div>}
                                        <button onClick={addFamilyMember} disabled={memberLoading || !newMemberPhone} className="btn-green">
                                            {memberLoading ? 'Adding...' : '+ Add family member'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                       {/* Quick reference */}
                        {userData.stops.length > 0 && (
                            <div className="card">
                                <h2>📱 Tell your child</h2>
                                <div style={{background:'#1a73e8', borderRadius:'10px', padding:'14px', marginBottom:'14px', color:'white', textAlign:'center'}}>
                                    <div style={{fontSize:'0.85em', opacity:'0.85', marginBottom:'4px'}}>Text this number:</div>
                                    <div style={{fontSize:'1.4em', fontWeight:'800', letterSpacing:'1px'}}>+44 7462 149542</div>
                                    <div style={{fontSize:'0.8em', opacity:'0.8', marginTop:'4px'}}>Save as "TextMyRide"</div>
                                </div>
                                <div className="phone-preview">
                                    {userData.stops.map(s => (
                                        <div key={s.keyword}>Text <strong>{s.keyword}</strong> for {s.type === 'train' ? 'trains from' : 'buses at'} {s.name}</div>
                                    ))}
                                    <div style={{marginTop:'8px'}}>Text <strong>HELP</strong> to see all stops</div>
                                </div>
                            </div>
                        )}

                        {/* Danger zone */}
                        <div className="card">
                            <h2 style={{color:'#e53935'}}>⚠️ Danger zone</h2>
                            {!deleteConfirm ? (
                                <button className="btn-danger" onClick={() => setDeleteConfirm(true)}>
                                    Delete my account
                                </button>
                            ) : (
                                <div>
                                    <div className="warning-box">This will permanently delete your account, all stops and cancel any subscription. This cannot be undone.</div>
                                    <button className="btn-danger" onClick={deleteAccount} style={{marginBottom:'8px'}}>
                                        Yes, permanently delete my account
                                    </button>
                                    <button className="btn-outline" onClick={() => setDeleteConfirm(false)}>
                                        Cancel
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [page, setPage] = useState('home');
            const [token, setTokenState] = useState(getToken);
            const [cancelled, setCancelled] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
                if (window.location.search.includes('cancelled=true')) {
                    setCancelled(true);
                    window.history.replaceState({}, '', '/');
                }
            }, [page]);

            useEffect(() => {
                // Auto-login if valid token exists
                if (token) { setPage('dashboard'); }
            }, []);

            function handleVerified(tok, isNewUser, plan) {
                setTokenState(tok);
                if (isNewUser && plan === 'free') { setPage('setup'); }
                else { setPage('dashboard'); }
            }

            function handleLogout() {
                clearToken();
                setTokenState(null);
                setPage('home');
            }

            function handleSetupComplete(plan) {
                if (plan === 'free') { setPage('dashboard'); }
            }

            return (
                <div>
                    <Nav page={page} setPage={setPage} loggedIn={!!token} onLogout={handleLogout} />
                    {page === 'home' && <HomePage setPage={setPage} cancelled={cancelled} />}
                    {page === 'how' && <HowItWorksPage setPage={setPage} />}
                    {page === 'contact' && <ContactPage />}
                    {page === 'verify' && <VerifyPage setPage={setPage} onVerified={handleVerified} mode="new" />}
                    {page === 'login' && <VerifyPage setPage={setPage} onVerified={handleVerified} mode="login" />}
                    {page === 'setup' && <PlanPage token={token} onComplete={handleSetupComplete} />}
                    {page === 'dashboard' && token && <DashboardPage token={token} setPage={setPage} onLogout={handleLogout} />}
                    <footer className="footer">
                        <div className="footer-logo">🚌 TextMyRide</div>
                        <p style={{marginBottom:'10px'}}>Live bus & train times by SMS</p>
                        <div>
                            <a href="mailto:hello@textmyride.co.uk">Contact</a>
                            <a href="/privacy" target="_blank">Privacy Policy</a>
                            <a href="/terms" target="_blank">Terms of Service</a>
                        </div>
                        <p style={{marginTop:'15px', fontSize:'0.8em'}}>© 2026 TextMyRide. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <script>
        window.GOOGLE_MAPS_API_KEY = '%%GOOGLE_MAPS_API_KEY%%';
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.GOOGLE_MAPS_API_KEY + '&libraries=places';
            script.async = true;
            document.head.appendChild(script);
        }
        loadGoogleMaps();
    </script>
</body>
</html>
