<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMyRide - Live Bus & Train Times by SMS</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
        .nav { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-logo { font-size: 1.3em; font-weight: 800; color: #1a73e8; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 5px; }
        .nav-link { padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9em; color: #555; border: none; background: none; transition: all 0.2s; }
        .nav-link:hover { background: #f0f4f8; color: #1a73e8; }
        .nav-link.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }
        .nav-cta { background: #1a73e8; color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600; border: none; transition: background 0.2s; }
        .nav-cta:hover { background: #1557b0; }
        .nav-manage { background: white; color: #1a73e8; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600; border: 2px solid #1a73e8; transition: all 0.2s; margin-right: 8px; }
        .nav-manage:hover { background: #e8f0fe; }
        .hero { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); color: white; padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 2.8em; font-weight: 800; margin-bottom: 15px; line-height: 1.2; }
        .hero p { font-size: 1.2em; opacity: 0.9; max-width: 560px; margin: 0 auto 30px; line-height: 1.6; }
        .hero-btns { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn-primary { background: white; color: #1a73e8; padding: 14px 28px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-secondary { background: transparent; color: white; padding: 14px 28px; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; border: 2px solid rgba(255,255,255,0.6); transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .stats { background: white; padding: 25px 20px; }
        .stats-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-num { font-size: 2em; font-weight: 800; color: #1a73e8; }
        .stat-label { font-size: 0.85em; color: #666; margin-top: 4px; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 60px 20px; }
        .section-title { text-align: center; font-size: 1.8em; font-weight: 700; margin-bottom: 10px; }
        .section-sub { text-align: center; color: #666; margin-bottom: 40px; font-size: 1.05em; }
        .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto; }
        .step-card { background: white; border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .step-icon { font-size: 2.5em; margin-bottom: 15px; }
        .step-card h3 { font-size: 1em; font-weight: 700; margin-bottom: 8px; color: #1a73e8; }
        .step-card p { font-size: 0.9em; color: #666; line-height: 1.5; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .feature { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .feature-icon { font-size: 2em; margin-bottom: 12px; }
        .feature h3 { font-weight: 700; margin-bottom: 8px; }
        .feature p { color: #666; font-size: 0.9em; line-height: 1.5; }
        .demo { background: white; border-radius: 16px; padding: 20px; max-width: 280px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .demo-header { background: #1a73e8; color: white; border-radius: 10px; padding: 10px 15px; margin-bottom: 15px; font-size: 0.85em; font-weight: 600; }
        .msg { margin-bottom: 10px; }
        .msg-out { text-align: right; }
        .msg-in { text-align: left; }
        .bubble { display: inline-block; padding: 8px 14px; border-radius: 18px; font-size: 0.9em; max-width: 85%; line-height: 1.4; }
        .bubble-out { background: #1a73e8; color: white; border-radius: 18px 18px 4px 18px; }
        .bubble-in { background: #f0f0f0; color: #333; border-radius: 18px 18px 18px 4px; }
        .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card h2 { font-size: 1.3em; margin-bottom: 20px; color: #1a73e8; }
        .step-row { display: flex; align-items: center; margin-bottom: 15px; }
        .step-num { background: #1a73e8; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; flex-shrink: 0; }
        input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; margin-bottom: 12px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #1a73e8; }
        input:disabled { background: #f5f5f5; color: #999; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .stop-card { border: 2px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .stop-card:hover { border-color: #1a73e8; background: #f8f9ff; }
        .stop-card.selected { border-color: #1a73e8; background: #e8f0fe; }
        .stop-name { font-weight: 600; font-size: 1em; }
        .stop-buses { color: #666; font-size: 0.9em; margin-top: 4px; }
        .map-container { width: 100%; height: 300px; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 2px solid #e0e0e0; }
        .keyword-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .keyword-row input { margin-bottom: 0; }
        .saved-stop { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #e8f0fe; border-radius: 10px; margin-bottom: 8px; }
        .saved-stop-name { font-weight: 600; color: #1a73e8; }
        .saved-stop-detail { color: #666; font-size: 0.9em; }
        .remove-btn { background: none; border: none; color: #e53935; cursor: pointer; font-size: 1.2em; width: auto; padding: 0 5px; }
        .remove-btn:hover { background: none; color: #c62828; }
        .success { background: #e8f5e9; border: 2px solid #4caf50; border-radius: 10px; padding: 20px; text-align: center; }
        .success h3 { color: #2e7d32; font-size: 1.3em; margin-bottom: 10px; }
        .success p { color: #388e3c; }
        .phone-preview { background: #f5f5f5; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 0.9em; margin-top: 15px; }
        .tag { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 3px 10px; border-radius: 20px; font-size: 0.85em; margin: 3px; }
        .error { color: #e53935; font-size: 0.9em; margin-bottom: 10px; }
        .info-box { background: #e8f0fe; border: 2px solid #1a73e8; border-radius: 10px; padding: 14px; margin-bottom: 14px; color: #1a73e8; font-size: 0.95em; }
        .warning-box { background: #fff8e1; border: 2px solid #ffc107; border-radius: 10px; padding: 14px; margin-bottom: 14px; color: #856404; font-size: 0.95em; }
        .verified-box { background: #e8f5e9; border: 2px solid #4caf50; border-radius: 10px; padding: 12px 15px; margin-bottom: 15px; color: #2e7d32; font-weight: 600; }
        .show-more-btn { background: white; color: #1a73e8; border: 2px solid #1a73e8; margin-top: 10px; }
        .show-more-btn:hover { background: #e8f0fe; }
        .show-less-btn { background: white; color: #666; border: 2px solid #ccc; margin-top: 10px; }
        .show-less-btn:hover { background: #f5f5f5; }
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; background: #f0f4f8; border: 2px solid #e0e0e0; border-radius: 8px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
        .checkbox-item.checked { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: 600; }
        .checkbox-item input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; border: 2px solid #e0e0e0; background: white; color: #666; transition: all 0.2s; }
        .type-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .station-result { border: 2px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .station-result:hover { border-color: #1a73e8; background: #f8f9ff; }
        .station-result.selected { border-color: #1a73e8; background: #e8f0fe; }
        .dest-item { display: flex; align-items: center; gap: 8px; background: #f0f4f8; border: 2px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
        .dest-item.checked { background: #e8f0fe; border-color: #1a73e8; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 700px; margin: 0 auto; }
        .contact-card { background: white; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .contact-card .icon { font-size: 2.5em; margin-bottom: 15px; }
        .contact-card h3 { font-weight: 700; margin-bottom: 8px; }
        .contact-card p { color: #666; font-size: 0.9em; line-height: 1.5; }
        .contact-card a { color: #1a73e8; text-decoration: none; font-weight: 600; }
        .plan-card { border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .plan-card.featured { border-color: #1a73e8; background: #f8f9ff; }
        .plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .plan-name { font-weight: 700; font-size: 1.1em; }
        .plan-price { font-weight: 800; font-size: 1.2em; color: #1a73e8; }
        .plan-features { color: #666; font-size: 0.9em; margin-bottom: 15px; line-height: 1.8; }
        .btn-outline { background: white; color: #1a73e8; border: 2px solid #1a73e8; }
        .btn-outline:hover { background: #e8f0fe; }
        .btn-danger { background: white; color: #e53935; border: 2px solid #e53935; }
        .btn-danger:hover { background: #ffebee; }
        .btn-green { background: #34a853; }
        .btn-green:hover { background: #2d8f47; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .plan-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 700; }
        .plan-badge.free { background: #f0f4f8; color: #666; }
        .plan-badge.basic { background: #e8f0fe; color: #1a73e8; }
        .plan-badge.family { background: #e8f5e9; color: #2e7d32; }
        .stop-limit-bar { background: #f0f4f8; border-radius: 8px; padding: 12px 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stop-limit-text { font-size: 0.9em; color: #555; }
        .stop-limit-count { font-weight: 700; color: #1a73e8; }
        .family-member { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #e8f5e9; border-radius: 10px; margin-bottom: 8px; font-size: 0.95em; }
        .footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 30px 20px; font-size: 0.9em; }
        .footer-logo { color: white; font-size: 1.2em; font-weight: 800; margin-bottom: 10px; }
        .footer a { color: #aaa; text-decoration: none; margin: 0 10px; }
        .footer a:hover { color: white; }
        .cancelled-banner { background: #fff3cd; border: 2px solid #ffc107; border-radius: 10px; padding: 14px; margin-bottom: 20px; color: #856404; text-align: center; font-weight: 600; }
        #map { width: 100%; height: 100%; }
        @media (max-width: 600px) { .hero h1 { font-size: 2em; } .nav-links { display: none; } .stats-inner { gap: 30px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const RESERVED = ['HELP','CHESS','STOP','EXIT','QUIT','CANCEL','INFO','STATUS','BUS','TRAIN','TRIP'];
        const PLAN_LIMITS = { free: 2, basic: 5, family: 10, premium: 10 };
        const TRIP_PLANS = ['premium'];

        function getToken() { try { return localStorage.getItem('tmr_session'); } catch(e) { return null; } }
        function setToken(t) { try { localStorage.setItem('tmr_session', t); } catch(e) {} }
        function clearToken() { try { localStorage.removeItem('tmr_session'); } catch(e) {} }

        function Nav({ page, setPage, loggedIn, onLogout }) {
            return (
                <nav className="nav">
                    <div className="nav-inner">
                        <div className="nav-logo" onClick={() => setPage('home')}>🚌 TextMyRide</div>
                        <div className="nav-links">
                            <button className={'nav-link' + (page === 'home' ? ' active' : '')} onClick={() => setPage('home')}>Home</button>
                            <button className={'nav-link' + (page === 'how' ? ' active' : '')} onClick={() => setPage('how')}>How it works</button>
                            <button className={'nav-link' + (page === 'contact' ? ' active' : '')} onClick={() => setPage('contact')}>Contact</button>
                        </div>
                        <div style={{display:'flex',gap:'8px'}}>
                            {loggedIn ? (
                                <>
                                    <button className="nav-manage" onClick={() => setPage('dashboard')}>My Stops</button>
                                    <button className="nav-cta" onClick={onLogout}>Log out</button>
                                </>
                            ) : (
                                <>
                                    <button className="nav-manage" onClick={() => setPage('login')}>Sign In</button>
                                    <button className="nav-cta" onClick={() => setPage('verify')}>Sign Up →</button>
                                </>
                            )}
                        </div>
                    </div>
                </nav>
            );
        }

        function HomePage({ setPage, cancelled }) {
            return (
                <div>
                    {cancelled && (
                        <div style={{padding: '20px'}}>
                            <div className="cancelled-banner">⚠️ Payment was cancelled. You can try again anytime from your dashboard.</div>
                        </div>
                    )}
                    <div className="hero">
                        <h1>Their stop. Their times.<br/>Their independence. 📱</h1>
                        <p>No smartphone needed. Your child texts a stop name and gets live times back instantly — without calling you every time they miss a bus.</p>
                        <div className="hero-btns">
                            <button className="btn-primary" onClick={() => setPage('verify')}>Set Up Your Stops →</button>
                            <button className="btn-secondary" onClick={() => setPage('how')}>How It Works</button>
                        </div>
                    </div>
                    <div className="stats">
                        <div className="stats-inner">
                            <div className="stat"><div className="stat-num">📱</div><div className="stat-label">Works on any phone</div></div>
                            <div className="stat"><div className="stat-num">🚌</div><div className="stat-label">Live bus times</div></div>
                            <div className="stat"><div className="stat-num">🚂</div><div className="stat-label">Live train times</div></div>
                            <div className="stat"><div className="stat-num">⚡</div><div className="stat-label">Instant reply</div></div>
                        </div>
                    </div>
                    <div className="section" style={{background: '#f0f4f8'}}>
                        <div className="container">
                            <div className="section-title">Simple for your child 💬</div>
                            <div className="section-sub">No app to download. No smartphone needed. Just text.</div>
                            <div className="demo">
                                <div className="demo-header">💬 Messages · TextMyRide</div>
                                <div className="msg msg-out"><span className="bubble bubble-out">SCHOOL</span></div>
                                <div className="msg msg-in"><span className="bubble bubble-in">🚌 Bus 271: 2 mins<br/>Bus 271: 14 mins<br/>Bus 271: 28 mins</span></div>
                                <div className="msg msg-out"><span className="bubble bubble-out">HOME</span></div>
                                <div className="msg msg-in"><span className="bubble bubble-in">🚌 Bus 119: 5 mins<br/>Bus 119: 18 mins</span></div>
                                <div className="msg msg-out"><span className="bubble bubble-out">HELP</span></div>
                                <div className="msg msg-in"><span className="bubble bubble-in">Your stops: HOME, SCHOOL<br/>Text any stop for live times!</span></div>
                            </div>
                        </div>
                    </div>
                    <div className="section">
                        <div className="container">
                            <div className="section-title">Why TextMyRide? 🌟</div>
                            <div className="section-sub">Built for families with children on basic phones</div>
                            <div className="features">
                                <div className="feature"><div className="feature-icon">📵</div><h3>No smartphone needed</h3><p>Works on any basic phone that can send and receive texts.</p></div>
                                <div className="feature"><div className="feature-icon">🎯</div><h3>Personalised stops</h3><p>Set up friendly names like HOME and SCHOOL. No stop codes needed.</p></div>
                                <div className="feature"><div className="feature-icon">✅</div><h3>Filter your services</h3><p>Only show the buses and trains your child actually uses.</p></div>
                                <div className="feature"><div className="feature-icon">🚂</div><h3>Bus & train times</h3><p>National Rail, London Overground and TfL — all in one place.</p></div>
                                <div className="feature"><div className="feature-icon">🔒</div><h3>Safe & private</h3><p>No app. No data stored on their phone. Just SMS.</p></div>
                                <div className="feature"><div className="feature-icon">💰</div><h3>Affordable</h3><p>Simple monthly subscription. Less than a coffee per month.</p></div>
                            </div>
                        </div>
                    </div>
                    <div className="section" style={{background: '#1a73e8', color: 'white', textAlign: 'center'}}>
                        <div className="section-title" style={{color: 'white'}}>Ready to get started? 🚀</div>
                        <p style={{color: 'rgba(255,255,255,0.9)', marginBottom: '25px', fontSize: '1.05em'}}>Set up your child's stops in under 2 minutes</p>
                        <button className="btn-primary" onClick={() => setPage('verify')} style={{width: 'auto', padding: '14px 35px', fontSize: '1.1em'}}>Set Up Now →</button>
                    </div>
                </div>
            );
        }

        function HowItWorksPage({ setPage }) {
            return (
                <div>
                    <div className="hero" style={{padding: '50px 20px'}}>
                        <h1 style={{fontSize: '2.2em'}}>How It Works</h1>
                        <p>Set up once, use forever. Takes less than 2 minutes.</p>
                    </div>
                    <div className="section">
                        <div className="container">
                            <div className="section-title">For parents — set up once 👨‍👩‍👧</div>
                            <div className="section-sub">Visit this website, enter your child's stops, done!</div>
                            <div className="steps">
                                <div className="step-card"><div className="step-icon">📍</div><h3>1. Enter your postcode</h3><p>We find all nearby bus stops automatically.</p></div>
                                <div className="step-card"><div className="step-icon">🗺️</div><h3>2. Pick your stops</h3><p>See stops on a map. Pick bus stops or train stations.</p></div>
                                <div className="step-card"><div className="step-icon">✅</div><h3>3. Filter services</h3><p>Tick only the buses or train destinations you want shown.</p></div>
                                <div className="step-card"><div className="step-icon">🏷️</div><h3>4. Name them</h3><p>Call them HOME, SCHOOL, TRAIN — whatever makes sense.</p></div>
                            </div>
                        </div>
                    </div>
                    <div className="section" style={{background: '#f0f4f8'}}>
                        <div className="container">
                            <div className="section-title">Useful commands 💬</div>
                            <div style={{maxWidth: '500px', margin: '0 auto'}}>
                                {[
                                    { cmd: 'HOME', desc: 'Get live bus times at your home stop' },
                                    { cmd: 'SCHOOL', desc: 'Get live bus times at your school stop' },
                                    { cmd: 'STATION', desc: 'Get live train times from your station' },
                                    { cmd: 'HELP', desc: 'See all your saved stop names' },
                                ].map(item => (
                                    <div key={item.cmd} style={{display: 'flex', alignItems: 'center', background: 'white', borderRadius: '10px', padding: '15px', marginBottom: '10px', boxShadow: '0 2px 8px rgba(0,0,0,0.06)'}}>
                                        <span className="tag" style={{minWidth: '80px', textAlign: 'center', marginRight: '15px'}}>{item.cmd}</span>
                                        <span style={{color: '#555'}}>{item.desc}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="section" style={{background: '#1a73e8', color: 'white', textAlign: 'center'}}>
                        <div className="section-title" style={{color: 'white'}}>Ready to set up? 🚀</div>
                        <p style={{color: 'rgba(255,255,255,0.9)', marginBottom: '25px'}}>Takes less than 2 minutes</p>
                        <button className="btn-primary" onClick={() => setPage('verify')} style={{width: 'auto', padding: '14px 35px', fontSize: '1.1em'}}>Set Up Your Stops →</button>
                    </div>
                </div>
            );
        }

        function ContactPage() {
            return (
                <div>
                    <div className="hero" style={{padding: '50px 20px'}}>
                        <h1 style={{fontSize: '2.2em'}}>Contact Us</h1>
                        <p>We'd love to hear from you!</p>
                    </div>
                    <div className="section">
                        <div className="contact-grid">
                            <div className="contact-card"><div className="icon">✉️</div><h3>Email Us</h3><p>For general enquiries, feedback or support</p><br/><a href="mailto:hello@textmyride.co.uk">hello@textmyride.co.uk</a></div>
                            <div className="contact-card"><div className="icon">🏫</div><h3>Schools</h3><p>Interested in a school-wide subscription?</p><br/><a href="mailto:schools@textmyride.co.uk">schools@textmyride.co.uk</a></div>
                        </div>
                        <div style={{maxWidth: '600px', margin: '40px auto 0', background: 'white', borderRadius: '16px', padding: '30px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)'}}>
                            <h3 style={{marginBottom: '15px', fontSize: '1.2em'}}>About TextMyRide</h3>
                            <p style={{color: '#555', lineHeight: '1.7'}}>TextMyRide was built by a parent who wanted a simple way for their child to get live bus and train times without needing a smartphone. We believe every child should be able to get around safely and independently, regardless of what phone they have.</p>
                        </div>
                    </div>
                </div>
            );
        }

        function VerifyPage({ setPage, onVerified, mode }) {
            const [phone, setPhone] = useState('');
            const [codeSent, setCodeSent] = useState(false);
            const [code, setCode] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [consent, setConsent] = useState(false);

            async function sendCode() {
                if (!phone.trim()) { setError('Please enter a phone number'); return; }
                setLoading(true); setError('');
                try {
                    const res = await fetch('/api/send-verification', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ phone })
                    });
                    const data = await res.json();
                    if (data.error) { setError(data.error); }
                    else { setCodeSent(true); }
                } catch(e) { setError('Could not send code. Please try again.'); }
                setLoading(false);
            }

            async function checkCode() {
                if (!code.trim()) { setError('Please enter the code'); return; }
                setLoading(true); setError('');
                try {
                    const res = await fetch('/api/check-verification', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ phone, code })
                    });
                    const data = await res.json();
                    if (data.error) { setError(data.error); }
                    else {
                        setToken(data.token);
                        onVerified(data.token, data.is_new_user, data.plan);
                    }
                } catch(e) { setError('Could not verify. Please try again.'); }
                setLoading(false);
            }

            const title = mode === 'login' ? '🔑 Log in to your account' : '📱 Verify your child\'s phone';
            const subtitle = mode === 'login' ? 'Enter your phone number to log in' : 'We\'ll send a code to verify the number';

            return (
                <div>
                    <div className="hero" style={{padding: '40px 20px'}}>
                        <h1 style={{fontSize: '2em'}}>{mode === 'login' ? 'Welcome back' : 'Get Started'}</h1>
                        <p style={{fontSize: '1em'}}>{subtitle}</p>
                    </div>
                    <div style={{maxWidth: '500px', margin: '30px auto', padding: '0 20px'}}>
                        <div className="card">
                            <h2>{title}</h2>
                            <input
                                type="tel"
                                placeholder="e.g. 07700123456"
                                value={phone}
                                onChange={e => { setPhone(e.target.value); setCodeSent(false); setCode(''); setError(''); }}
                                disabled={codeSent}
                            />
                            {!codeSent && (
                                <>
                                    {error && <div className="error">{error}</div>}
                                   <div style={{background:'#f0f4f8', borderRadius:'10px', padding:'14px', marginBottom:'12px'}}>
                                        <label style={{display:'flex', gap:'12px', alignItems:'flex-start', cursor:'pointer'}}>
                                            <input
                                                type="checkbox"
                                                checked={consent}
                                                onChange={e => setConsent(e.target.checked)}
                                                style={{width:'auto', margin:'2px 0 0 0', flexShrink:0}}
                                            />
                                            <span style={{fontSize:'0.85em', color:'#444', lineHeight:'1.5'}}>
                                                I confirm I am the parent or guardian of the child whose phone number I am registering.
                                                I have read and agree to the <a href="/privacy" target="_blank" style={{color:'#1a73e8'}}>Privacy Policy</a> and <a href="/terms" target="_blank" style={{color:'#1a73e8'}}>Terms of Service</a>.
                                            </span>
                                        </label>
                                    </div>
                                    <button onClick={sendCode} disabled={loading || !phone || !consent}>
                                        {loading ? 'Sending...' : 'Send Verification Code →'}
                                    </button>
                                </>
                            )}
                            {codeSent && (
                                <div>
                                    <div className="info-box">📱 Code sent to {phone}. Check the phone!</div>
                                    <input
                                        type="number"
                                        placeholder="Enter 6-digit code"
                                        value={code}
                                        onChange={e => setCode(e.target.value)}
                                        maxLength={6}
                                    />
                                    {error && <div className="error">{error}</div>}
                                    <button onClick={checkCode} disabled={loading || !code}>
                                        {loading ? 'Verifying...' : 'Verify & Continue →'}
                                    </button>
                                    <button onClick={() => { setCodeSent(false); setCode(''); setError(''); }}
                                        style={{background:'white', color:'#666', border:'2px solid #ccc', marginTop:'10px'}}>
                                        ← Use a different number
                                    </button>
                                    <button onClick={sendCode} disabled={loading}
                                        style={{background:'white', color:'#1a73e8', border:'2px solid #1a73e8', marginTop:'8px'}}>
                                        Resend code
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AddStopPage({ token, plan, stopCount, stopLimit, onStopAdded, onBack }) {
            const placeInputRef = useRef(null);
            const stationInputRef = useRef(null);
            const [stopType, setStopType] = useState('bus');
            const [postcode, setPostcode] = useState('');
            const [nearbyStops, setNearbyStops] = useState([]);
            const [selectedStop, setSelectedStop] = useState(null);
            const [selectedBuses, setSelectedBuses] = useState([]);
            const [stationSearch, setStationSearch] = useState('');
            const [stationResults, setStationResults] = useState([]);
            const [selectedStation, setSelectedStation] = useState(null);
            const [destinations, setDestinations] = useState([]);
            const [selectedDests, setSelectedDests] = useState([]);
            const [keyword, setKeyword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [mapCenter, setMapCenter] = useState(null);
            const [showingMore, setShowingMore] = useState(false);
            const [placeSearch, setPlaceSearch] = useState('');
            const [step, setStep] = useState(1);
            const mapRef = useRef(null);
            const googleMapRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (step === 2 && mapCenter && window.google && stopType === 'bus') {
                    initMap();
                }
            }, [step, mapCenter, nearbyStops, stopType]);

            useEffect(() => {
                if (placeInputRef.current && window.google) {
                    const autocomplete = new window.google.maps.places.Autocomplete(
                        placeInputRef.current,
                        { componentRestrictions: { country: 'gb' }, fields: ['geometry', 'name', 'formatted_address'] }
                    );
                    autocomplete.addListener('place_changed', async () => {
                        const place = autocomplete.getPlace();
                        if (!place.geometry) return;
                        setError('');
                        setPlaceSearch(place.name || place.formatted_address || '');
                        const lat = place.geometry.location.lat();
                        const lng = place.geometry.location.lng();
                        setLoading(true); setError('');
                        const res = await fetch('/api/find-stops', {
                            method: 'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ lat, lon: lng, radius: 400 })
                        });
                        const data = await res.json();
                        if (data.error) { setError(data.error); }
                        else { setNearbyStops(data.stops); setMapCenter(data.center); setStep(2); }
                        setLoading(false);
                    });
                }
            }, [placeInputRef.current]);
            useEffect(() => {
                if (stationInputRef.current && window.google && stopType === 'train') {
                    const autocomplete = new window.google.maps.places.Autocomplete(
                        stationInputRef.current,
                        {
                            componentRestrictions: { country: 'gb' },
                            types: ['transit_station'],
                            fields: ['name']
                        }
                    );
                    autocomplete.addListener('place_changed', async () => {
                        const place = autocomplete.getPlace();
                        if (!place.name) return;
                        // Clean up station name for search
                        // e.g. "Balham Underground Station" → "Balham"
                        // Take just the first part before any comma
                        let name = place.name.split(',')[0]
                            .replace(' Railway Station', '')
                            .replace(' Train Station', '')
                            .replace(' Underground Station', '')
                            .replace(' Overground Station', '')
                            .replace(' Station', '')
                            .trim();
                        setStationSearch(name);
                        setLoading(true); setError('');
                        try {
                            const res = await fetch('/api/find-stations', {
                                method: 'POST', headers: {'Content-Type':'application/json'},
                                body: JSON.stringify({ query: name })
                            });
                            const data = await res.json();
                            if (data.error) { setError(data.error); }
                            else { setStationResults(data.stations); }
                        } catch(e) { setError('Could not search stations.'); }
                        setLoading(false);
                    });
                }
            }, [stationInputRef.current, stopType]);
            
            function initMap() {
                if (!mapRef.current) return;
                googleMapRef.current = new window.google.maps.Map(mapRef.current, {
                    center: { lat: mapCenter.lat, lng: mapCenter.lon },
                    zoom: 15, mapTypeControl: false, streetViewControl: false,
                });
                markersRef.current.forEach(m => m.setMap(null));
                markersRef.current = [];
                nearbyStops.forEach((stop, i) => {
                    if (!stop.lat || !stop.lon) return;
                    const marker = new window.google.maps.Marker({
                        position: { lat: stop.lat, lng: stop.lon },
                        map: googleMapRef.current,
                        title: stop.name,
                        label: { text: String(i + 1), color: 'white' },
                        icon: {
                            path: window.google.maps.SymbolPath.CIRCLE,
                            scale: 18,
                            fillColor: selectedStop === i ? '#0d47a1' : '#1a73e8',
                            fillOpacity: 1, strokeColor: 'white', strokeWeight: 2,
                        }
                    });
                    marker.addListener('click', () => { setSelectedStop(i); setSelectedBuses([]); });
                    markersRef.current.push(marker);
                });
            }

             async function searchByPlace() {
                if (!placeSearch.trim()) return;
                setLoading(true); setError('');
                try {
                    // Use Google Places to find the location
                    const service = new window.google.maps.places.PlacesService(
                        document.createElement('div')
                    );
                    service.findPlaceFromQuery({
                        query: placeSearch,
                        fields: ['geometry', 'formatted_address', 'name']
                    }, async (results, status) => {
                        if (status === window.google.maps.places.PlacesServiceStatus.OK && results[0]) {
                            const loc = results[0].geometry.location;
                            const lat = loc.lat();
                            const lng = loc.lng();
                            // Reverse geocode to get postcode
                            const geocoder = new window.google.maps.Geocoder();
                            geocoder.geocode({ location: { lat, lng } }, async (geoResults, geoStatus) => {
                                if (geoStatus === 'OK' && geoResults[0]) {
                                    // Extract postcode from address components
                                    const pcComponent = geoResults[0].address_components.find(c =>
                                        c.types.includes('postal_code')
                                    );
                                    if (pcComponent) {
                                        setPostcode(pcComponent.long_name);
                                        // Auto-search for stops at this postcode
                                        const res = await fetch('/api/find-stops', {
                                            method: 'POST', headers: {'Content-Type':'application/json'},
                                            body: JSON.stringify({ postcode: pcComponent.long_name, radius: 400 })
                                        });
                                        const data = await res.json();
                                        if (data.error) { setError(data.error); }
                                        else { setNearbyStops(data.stops); setMapCenter(data.center); setStep(2); }
                                    } else {
                                        setError('Could not find a postcode for that location. Try entering the postcode directly.');
                                    }
                                } else {
                                    setError('Could not find that location. Try entering the postcode directly.');
                                }
                                setLoading(false);
                            });
                        } else {
                            setError('Place not found. Try a more specific name or enter a postcode.');
                            setLoading(false);
                        }
                    });
                } catch(e) {
                    setError('Could not search for that place. Try entering the postcode directly.');
                    setLoading(false);
                }
            }
            
            async function findStops(radius = 400) {
                setError(''); setLoading(true);
                try {
                    const res = await fetch('/api/find-stops', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ postcode, radius })
                    });
                    const data = await res.json();
                    if (data.error) { setError(data.error); }
                    else { setNearbyStops(data.stops); setMapCenter(data.center); setStep(2); }
                } catch(e) { setError('Could not find stops. Please try again.'); }
                setLoading(false);
            }

            async function searchStations() {
                if (!stationSearch.trim()) return;
                setLoading(true); setError('');
                try {
                    const res = await fetch('/api/find-stations', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ query: stationSearch })
                    });
                    const data = await res.json();
                    if (data.error) { setError(data.error); }
                    else { setStationResults(data.stations); }
                } catch(e) { setError('Could not search stations.'); }
                setLoading(false);
            }

            async function selectStation(station) {
                setSelectedStation(station); setSelectedDests([]); setLoading(true);
                try {
                    const res = await fetch('/api/train-destinations', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ crs: station.crs })
                    });
                    const data = await res.json();
                    if (data.destinations) { setDestinations(data.destinations); }
                } catch(e) { setError('Could not load destinations.'); }
                setLoading(false);
            }

            function toggleBus(bus) {
                setSelectedBuses(prev => prev.includes(bus) ? prev.filter(b => b !== bus) : [...prev, bus]);
            }

            function toggleDest(dest) {
                setSelectedDests(prev => prev.includes(dest) ? prev.filter(d => d !== dest) : [...prev, dest]);
            }

            async function saveStop() {
                setError('');
                const kw = keyword.trim().toUpperCase();
                if (!kw) { setError('Please enter a keyword name'); return; }
                if (RESERVED.includes(kw)) { setError('"' + kw + '" is reserved. Please choose a different name.'); return; }
                if (!/^[A-Z0-9]{1,10}$/.test(kw)) { setError('Keyword must be letters/numbers only, max 10 characters'); return; }

                let stopData = {};
                if (stopType === 'bus') {
                    if (selectedStop === null) { setError('Please select a stop'); return; }
                    if (selectedBuses.length === 0) { setError('Please select at least one bus'); return; }
                    const s = nearbyStops[selectedStop];
                    stopData = { type: 'bus', stop: s.stop, buses: selectedBuses, name: s.name };
                } else {
                    if (!selectedStation) { setError('Please select a station'); return; }
                    if (selectedDests.length === 0) { setError('Please select at least one destination'); return; }
                    stopData = { type: 'train', crs: selectedStation.crs, name: selectedStation.name, destinations: selectedDests };
                }

                setLoading(true);
                try {
                    const res = await fetch('/api/add-stop', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token, keyword: kw, stop: stopData })
                    });
                    const data = await res.json();
                    if (data.error) { setError(data.error); }
                    else { onStopAdded(); }
                } catch(e) { setError('Could not save stop. Please try again.'); }
                setLoading(false);
            }

            if (stopCount >= stopLimit) {
                const nextPlan = plan === 'free' ? 'basic' : 'family';
                const nextLimit = PLAN_LIMITS[nextPlan];
                return (
                    <div style={{maxWidth:'600px', margin:'30px auto', padding:'0 20px'}}>
                        <div className="card">
                            <h2>⚠️ Stop limit reached</h2>
                            <div className="warning-box">
                                You've used all {stopLimit} stops on your {plan.charAt(0).toUpperCase()+plan.slice(1)} plan.
                                Upgrade to {nextPlan.charAt(0).toUpperCase()+nextPlan.slice(1)} to add up to {nextLimit} stops.
                            </div>
                            <button onClick={() => onStopAdded('upgrade')} style={{marginBottom:'10px'}}>
                                Upgrade to {nextPlan.charAt(0).toUpperCase()+nextPlan.slice(1)} →
                            </button>
                            <button onClick={onBack} className="btn-outline">← Back to dashboard</button>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div className="hero" style={{padding: '40px 20px'}}>
                        <h1 style={{fontSize: '2em'}}>Add a Stop</h1>
                        <p style={{fontSize: '1em'}}>{stopCount}/{stopLimit} stops used on your {plan.charAt(0).toUpperCase()+plan.slice(1)} plan</p>
                    </div>
                    <div style={{maxWidth:'600px', margin:'30px auto', padding:'0 20px'}}>
                        {step === 1 && (
                            <div className="card">
                                <h2>🚌 What would you like to add?</h2>
                                <div className="type-toggle">
                                    <button className={'type-btn' + (stopType === 'bus' ? ' active' : '')} onClick={() => { setStopType('bus'); setSelectedStation(null); setStationResults([]); setDestinations([]); setSelectedDests([]); }}>🚌 Bus Stop</button>
                                    <button className={'type-btn' + (stopType === 'train' ? ' active' : '')} onClick={() => { setStopType('train'); setSelectedStop(null); setSelectedBuses([]); }}>🚂 Train Station</button>
                                </div>
                                {stopType === 'bus' && (
                                    <>
                                        <input type="text" placeholder="Enter postcode e.g. SW12 9RQ" value={postcode} onChange={e => setPostcode(e.target.value.toUpperCase())} />
                                        <p style={{textAlign:'center', color:'#888', fontSize:'0.85em', margin:'-8px 0 8px'}}>— or search by place name —</p>
                                        <div className="keyword-row">
                                            <input
                                                id="place-autocomplete"
                                                type="text"
                                                placeholder="e.g. Whitgift School Croydon"
                                                value={placeSearch}
                                                onChange={e => setPlaceSearch(e.target.value)}
                                                style={{marginBottom:0, textTransform:'none'}}
                                                ref={placeInputRef}
                                            />
                                            <button onClick={searchByPlace} style={{width:'auto', padding:'14px 20px'}} disabled={loading || !placeSearch}>
                                                {loading ? '...' : 'Search'}
                                            </button>
                                        </div>
                                        {error && error !== 'Please enter a postcode' && <div className="error">{error}</div>}
                                        <button onClick={() => findStops(400)} disabled={loading || !postcode}>
                                            {loading ? 'Finding stops...' : 'Find Nearby Bus Stops →'}
                                        </button>
                                    </>
                                )}
                                {stopType === 'train' && (
                                    <>
                                       <div className="keyword-row">
                                            <input
                                                type="text"
                                                placeholder="e.g. Balham"
                                                value={stationSearch}
                                                onChange={e => setStationSearch(e.target.value)}
                                                style={{marginBottom:0}}
                                                ref={stationInputRef}
                                            />
                                            <button onClick={searchStations} style={{width:'auto', padding:'14px 20px'}} disabled={loading || !stationSearch}>
                                                {loading ? '...' : 'Search'}
                                            </button>
                                        </div>
                                        {error && <div className="error">{error}</div>}
                                        {stationResults.map((s, i) => (
                                            <div key={i} className={'station-result' + (selectedStation && selectedStation.crs === s.crs ? ' selected' : '')} onClick={() => selectStation(s)}>
                                                <div className="stop-name">🚂 {s.name} {selectedStation && selectedStation.crs === s.crs && '✓'}</div>
                                                <div className="stop-buses">CRS: {s.crs}</div>
                                            </div>
                                        ))}
                                        {selectedStation && destinations.length > 0 && (
                                            <div style={{marginTop:'15px'}}>
                                                <p style={{fontWeight:'600', marginBottom:'10px'}}>Which destinations? (tick all that apply)</p>
                                                {destinations.map((dest, i) => (
                                                     <div key={i} className={'dest-item' + (selectedDests.includes(dest) ? ' checked' : '')} onClick={() => toggleDest(dest)} style={{flexDirection:'row', justifyContent:'flex-start'}}>
                                                        <input type="checkbox" checked={selectedDests.includes(dest)} onChange={() => {}} style={{width:'auto', marginRight:'10px'}} />
                                                        <span>🚂 {dest}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {selectedStation && selectedDests.length > 0 && (
                                            <div style={{marginTop:'15px'}}>
                                                <input type="text" placeholder="Name this stop e.g. STATION" value={keyword} onChange={e => setKeyword(e.target.value.toUpperCase())} maxLength={10} />
                                                {error && <div className="error">{error}</div>}
                                                <button onClick={saveStop} disabled={loading || !keyword}>
                                                    {loading ? 'Saving...' : 'Save Stop →'}
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}
                                <button onClick={onBack} style={{background:'white', color:'#666', border:'2px solid #ccc', marginTop:'12px'}}>← Back</button>
                            </div>
                        )}

                        {step === 2 && stopType === 'bus' && (
                            <div>
                                <div className="card">
                                    <h2>📍 Stops near {postcode}</h2>
                                    <div className="map-container"><div id="map" ref={mapRef}></div></div>
                                    {nearbyStops.map((stop, i) => (
                                        <div key={i} className={'stop-card' + (selectedStop === i ? ' selected' : '')} onClick={() => { setSelectedStop(i); setSelectedBuses([]); }}>
                                            <div className="stop-name">{i + 1}. {stop.name}{selectedStop === i && ' ✓'}</div>
                                            <div className="stop-buses">Buses: {stop.buses.slice(0,8).map(b => (<span key={b} className="tag">{b}</span>))}</div>
                                        </div>
                                    ))}
                                    {!showingMore ? (
                                        <button className="show-more-btn" onClick={() => { setShowingMore(true); findStops(800); }}>🔍 Show more stops (further away)</button>
                                    ) : (
                                        <button className="show-less-btn" onClick={() => { setShowingMore(false); findStops(400); }}>Show fewer stops</button>
                                    )}
                                </div>

                                {selectedStop !== null && (
                                    <div className="card">
                                        <h2>🚌 Which buses do you want?</h2>
                                        <p style={{color:'#666', marginBottom:'12px'}}>Tick only the buses your child uses from <strong>{nearbyStops[selectedStop].name}</strong></p>
                                        <div className="checkbox-grid">
                                            {nearbyStops[selectedStop].buses.map(bus => (
                                                <div key={bus} className={'checkbox-item' + (selectedBuses.includes(bus) ? ' checked' : '')} onClick={() => toggleBus(bus)}>
                                                    <input type="checkbox" checked={selectedBuses.includes(bus)} onChange={() => {}} />
                                                    <span>{bus}</span>
                                                </div>
                                            ))}
                                        </div>
                                        {selectedBuses.length > 0 && (
                                            <div style={{marginTop:'15px'}}>
                                                <p style={{fontWeight:'600', marginBottom:'8px'}}>Name this stop:</p>
                                                <div className="keyword-row">
                                                    <input type="text" placeholder="e.g. HOME or SCHOOL" value={keyword} onChange={e => setKeyword(e.target.value.toUpperCase())} maxLength={10} style={{marginBottom:0}} />
                                                    <button onClick={saveStop} style={{width:'auto', padding:'14px 20px'}} disabled={loading}>
                                                        {loading ? '...' : 'Save'}
                                                    </button>
                                                </div>
                                                {error && <div className="error">{error}</div>}
                                            </div>
                                        )}
                                    </div>
                                )}
                                <button onClick={onBack} style={{background:'white', color:'#666', border:'2px solid #ccc', marginBottom:'20px'}}>← Back to dashboard</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function PlanPage({ token, onComplete, savedStops }) {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [done, setDone] = useState(false);
            async function choosePlan(plan) {
                setLoading(true); setError('');
                if (plan === 'free') {
                    setDone(true);
                    setLoading(false);
                    return;
                }
                try {
                    const res = await fetch('/api/create-checkout', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token, plan })
                    });
                    const data = await res.json();
                    if (data.checkout_url) {
                        window.location.href = data.checkout_url;
                    } else {
                        setError(data.error || 'Could not start checkout.');
                    }
                } catch(e) { setError('Something went wrong. Please try again.'); }
                setLoading(false);
            }

            if (done) {
                return (
                    <div style={{maxWidth:'600px', margin:'30px auto', padding:'0 20px'}}>
                        <div className="card">
                            <div className="success">
                                <h3>🎉 All set up!</h3>
                                <p>Your child's stops have been saved successfully.</p>
                            </div>

                            <div style={{background:'#1a73e8', borderRadius:'12px', padding:'20px', margin:'20px 0', color:'white', textAlign:'center'}}>
                                <div style={{fontSize:'0.9em', opacity:'0.85', marginBottom:'6px'}}>📱 Your child needs to save this number:</div>
                                <div style={{fontSize:'1.8em', fontWeight:'800', letterSpacing:'2px'}}>+44 7462 149542</div>
                                <div style={{fontSize:'0.85em', opacity:'0.8', marginTop:'6px'}}>Save it as "TextMyRide" in their phone</div>
                            </div>

                            <div style={{marginBottom:'20px'}}>
                                <div style={{fontWeight:'700', fontSize:'1em', marginBottom:'12px'}}>📋 What to do next:</div>
                                <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                                    <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                                        <div style={{background:'#1a73e8', color:'white', borderRadius:'50%', width:'26px', height:'26px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', fontSize:'0.85em', flexShrink:0}}>1</div>
                                        <div style={{fontSize:'0.9em', color:'#444'}}>Save <strong>+44 7462 149542</strong> as "TextMyRide" in your child's phone</div>
                                    </div>
                                    <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                                        <div style={{background:'#1a73e8', color:'white', borderRadius:'50%', width:'26px', height:'26px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', fontSize:'0.85em', flexShrink:0}}>2</div>
                                        <div style={{fontSize:'0.9em', color:'#444'}}>They text a keyword to get live times — see their stops below</div>
                                    </div>
                                    <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                                        <div style={{background:'#1a73e8', color:'white', borderRadius:'50%', width:'26px', height:'26px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', fontSize:'0.85em', flexShrink:0}}>3</div>
                                        <div style={{fontSize:'0.9em', color:'#444'}}>They text <strong>HELP</strong> anytime to see all their stop names</div>
                                    </div>
                                    <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                                        <div style={{background:'#34a853', color:'white', borderRadius:'50%', width:'26px', height:'26px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', fontSize:'0.85em', flexShrink:0}}>+</div>
                                        <div style={{fontSize:'0.9em', color:'#444'}}>To add more stops later, click <strong>Sign In</strong> from the top menu</div>
                                    </div>
                                </div>
                            </div>

                            <div style={{background:'#e5e5ea', borderRadius:'12px', padding:'15px', marginBottom:'20px'}}>
                                <div style={{fontWeight:'700', marginBottom:'10px', fontSize:'0.95em'}}>💬 What the replies look like:</div>
                                <div style={{background:'white', borderRadius:'10px', padding:'12px'}}>
                                    <div style={{background:'#e5e5ea', borderRadius:'12px 12px 12px 4px', padding:'8px 12px', fontSize:'0.85em', marginBottom:'8px', display:'inline-block', maxWidth:'85%'}}>
                                        🚌 Bus 271: 2 mins<br/>Bus 271: 14 mins<br/>Bus 271: 28 mins
                                    </div>
                                    <div style={{textAlign:'right'}}>
                                        <div style={{background:'#1a73e8', color:'white', borderRadius:'12px 12px 4px 12px', padding:'8px 12px', fontSize:'0.85em', display:'inline-block'}}>HELP</div>
                                    </div>
                                    <div style={{background:'#e5e5ea', borderRadius:'12px 12px 12px 4px', padding:'8px 12px', fontSize:'0.85em', marginTop:'8px', display:'inline-block', maxWidth:'85%'}}>
                                        Your stops: HOME, SCHOOL<br/>Text any stop for live times!
                                    </div>
                                </div>
                            </div>

                            <button className="btn-green" onClick={() => onComplete('free')}>
                                Go to My Dashboard →
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{maxWidth:'600px', margin:'30px auto', padding:'0 20px'}}>
                    <div className="card">
                        <h2>💳 Choose your plan</h2>
                        <p style={{color:'#666', marginBottom:'20px'}}>Your stops are ready — pick a plan to activate them.</p>
                        {error && <div className="error">{error}</div>}

                        <div className="plan-card">
                            <div className="plan-header">
                                <div className="plan-name">Free</div>
                                <div className="plan-price">£0/month</div>
                            </div>
                            <div className="plan-features">✓ 1 phone number<br/>✓ Up to 2 stops<br/>✓ Bus &amp; train times</div>
                            <button className="btn-outline" onClick={() => choosePlan('free')} disabled={loading}>
                                {loading ? 'Setting up...' : 'Continue Free →'}
                            </button>
                        </div>

                        <div className="plan-card featured">
                            <div className="plan-header">
                                <div className="plan-name">Basic ⭐</div>
                                <div className="plan-price">£2.99/month</div>
                            </div>
                            <div className="plan-features">✓ 1 phone number<br/>✓ Up to 5 stops<br/>✓ Priority support</div>
                            <button onClick={() => choosePlan('basic')} disabled={loading}>
                                {loading ? 'Setting up...' : 'Choose Basic →'}
                            </button>
                        </div>

                        <div className="plan-card">
                            <div className="plan-header">
                                <div className="plan-name">Family 👨‍👩‍👧</div>
                                <div className="plan-price">£4.99/month</div>
                            </div>
                            <div className="plan-features">✓ Up to 5 phone numbers<br/>✓ Up to 10 stops per number<br/>✓ Priority support</div>
                            <button className="btn-outline" onClick={() => choosePlan('family')} disabled={loading}>
                                {loading ? 'Setting up...' : 'Choose Family →'}
                            </button>
                        </div>

                        <div className="plan-card" style={{borderColor:'#9c27b0', background:'#fdf3ff'}}>
                            <div className="plan-header">
                                <div className="plan-name">Premium 🌟</div>
                                <div className="plan-price" style={{color:'#9c27b0'}}>£9.99/month</div>
                            </div>
                            <div className="plan-features">
                                ✓ Up to 5 phone numbers<br/>
                                ✓ Up to 10 stops per number<br/>
                                ✓ <strong>TRIP journey planner</strong><br/>
                                ✓ Text TRIP SW12 TO SW1A for routes<br/>
                                ✓ Priority support
                            </div>
                            <button onClick={() => choosePlan('premium')} disabled={loading}
                                style={{background:'#9c27b0'}}>
                                {loading ? 'Setting up...' : 'Choose Premium →'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function DashboardPage({ token, setPage, onLogout }) {
            const [userData, setUserData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [view, setView] = useState('dashboard');
            const [newMemberPhone, setNewMemberPhone] = useState('');
            const [memberLoading, setMemberLoading] = useState(false);
            const [memberError, setMemberError] = useState('');
            const [memberSuccess, setMemberSuccess] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(false);

            useEffect(() => { loadUser(); }, []);

            async function loadUser() {
                setLoading(true);
                try {
                    const res = await fetch('/api/get-user', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token })
                    });
                    const data = await res.json();
                    if (data.error) { clearToken(); onLogout(); return; }
                    setUserData(data);
                } catch(e) { setError('Could not load your account.'); }
                setLoading(false);
            }

            async function deleteStop(keyword) {
                try {
                    const res = await fetch('/api/delete-stop', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token, keyword })
                    });
                    const data = await res.json();
                    if (data.success) { loadUser(); }
                } catch(e) { setError('Could not delete stop.'); }
            }

            async function addFamilyMember() {
                if (!newMemberPhone.trim()) { setMemberError('Please enter a phone number'); return; }
                setMemberLoading(true); setMemberError(''); setMemberSuccess('');
                try {
                    const res = await fetch('/api/add-family-member', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token, member_phone: newMemberPhone })
                    });
                    const data = await res.json();
                    if (data.error) { setMemberError(data.error); }
                    else { setMemberSuccess('Family member added! They\'ll receive a welcome text.'); setNewMemberPhone(''); loadUser(); }
                } catch(e) { setMemberError('Could not add family member.'); }
                setMemberLoading(false);
            }

            async function deleteAccount() {
                try {
                    const res = await fetch('/api/delete-account', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token })
                    });
                    const data = await res.json();
                    if (data.success) { clearToken(); onLogout(); }
                } catch(e) { setError('Could not delete account.'); }
            }

            async function upgradePlan(plan) {
                try {
                    const res = await fetch('/api/create-checkout', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ token, plan })
                    });
                    const data = await res.json();
                    if (data.checkout_url) { window.location.href = data.checkout_url; }
                } catch(e) { setError('Could not start checkout.'); }
            }

            if (loading) return <div style={{textAlign:'center', padding:'60px', color:'#666'}}>Loading your account...</div>;
            if (!userData) return null;

            if (view === 'add') {
                return <AddStopPage
                    token={token}
                    plan={userData.plan}
                    stopCount={userData.stop_count}
                    stopLimit={userData.stop_limit}
                    onStopAdded={(action) => {
                        if (action === 'upgrade') { upgradePlan(userData.plan === 'free' ? 'basic' : 'family'); }
                        else { setView('dashboard'); loadUser(); }
                    }}
                    onBack={() => setView('dashboard')}
                />;
            }

            const planColors = { free: '#888', basic: '#1a73e8', family: '#34a853', premium: '#9c27b0' };
            const canUpgrade = userData.plan !== 'premium';
            const atLimit = userData.stop_count >= userData.stop_limit;
            const hasTRIP = TRIP_PLANS.includes(userData.plan);

            return (
                <div>
                    <div className="hero" style={{padding:'40px 20px'}}>
                        <h1 style={{fontSize:'2em'}}>My Stops Dashboard</h1>
                        <p style={{fontSize:'1em'}}>{userData.phone}</p>
                    </div>
                    <div style={{maxWidth:'600px', margin:'30px auto', padding:'0 20px'}}>
                        {error && <div className="error">{error}</div>}

                        {/* Plan summary */}
                        <div className="card">
                            <div className="dashboard-header">
                                <h2 style={{marginBottom:0}}>Your plan</h2>
                                <span className={'plan-badge ' + userData.plan}>
                                    {userData.plan.charAt(0).toUpperCase()+userData.plan.slice(1)}
                                </span>
                            </div>
                            <div className="stop-limit-bar">
                                <span className="stop-limit-text">Stops used</span>
                                <span className="stop-limit-count">{userData.stop_count} / {userData.stop_limit}</span>
                            </div>
                            {canUpgrade && (
                                <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                    {userData.plan === 'free' && (
                                        <button onClick={() => upgradePlan('basic')}
                                            style={{background:'white', color:'#1a73e8', border:'2px solid #1a73e8', fontSize:'0.9em'}}>
                                            ⬆️ Upgrade to Basic — 5 stops (£2.99/mo)
                                        </button>
                                    )}
                                    {(userData.plan === 'free' || userData.plan === 'basic') && (
                                        <button onClick={() => upgradePlan('family')}
                                            style={{background:'white', color:'#34a853', border:'2px solid #34a853', fontSize:'0.9em'}}>
                                            ⬆️ Upgrade to Family — 5 numbers + 10 stops (£4.99/mo)
                                        </button>
                                    )}
                                    {userData.plan !== 'premium' && (
                                        <button onClick={() => upgradePlan('premium')}
                                            style={{background:'white', color:'#9c27b0', border:'2px solid #9c27b0', fontSize:'0.9em'}}>
                                            🌟 Upgrade to Premium — TRIP journey planner (£9.99/mo)
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Stops */}
                        <div className="card">
                            <h2>📍 Your stops</h2>
                            {userData.stops.length === 0 ? (
                                <p style={{color:'#666', marginBottom:'15px'}}>No stops set up yet. Add your first stop below!</p>
                            ) : (
                                userData.stops.map(s => (
                                    <div key={s.keyword} className="saved-stop">
                                        <div>
                                            <div className="saved-stop-name">{s.keyword} {s.type === 'train' ? '🚂' : '🚌'}</div>
                                            <div className="saved-stop-detail">{s.name}</div>
                                        </div>
                                        <button className="remove-btn" onClick={() => deleteStop(s.keyword)}>✕</button>
                                    </div>
                                ))
                            )}
                            {atLimit ? (
                                <div className="warning-box" style={{marginTop:'10px'}}>
                                    ⚠️ Stop limit reached ({userData.stop_limit} stops on {userData.plan} plan).
                                    <button onClick={() => upgradePlan(userData.plan === 'free' ? 'basic' : userData.plan === 'basic' ? 'family' : 'premium')}
                                        style={{marginTop:'8px', fontSize:'0.9em'}}>
                                        Upgrade to add more stops →
                                    </button>
                                </div>
                            ) : (
                                <button className="btn-green" onClick={() => setView('add')} style={{marginTop:'10px'}}>
                                    + Add a stop ({userData.stop_limit - userData.stop_count} remaining)
                                </button>
                            )}
                        </div>

                        {/* TRIP journey planner */}
                        {hasTRIP ? (
                            <div className="card">
                                <h2>🗺️ TRIP Journey Planner</h2>
                                <div className="verified-box" style={{marginBottom:'12px'}}>
